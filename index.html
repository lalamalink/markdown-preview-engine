<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="color-scheme" content="light dark">
    <title>Markdown Preview Engine</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="title-group">
          <p class="eyebrow">WKWebView-ready static prototype</p>
          <h1>Markdown Preview Engine</h1>
        </div>

        <div class="controls" aria-label="表示設定">
          <label class="control-field">
            <span data-i18n="theme">テーマ</span>
            <select id="themeSelect">
              <option value="system" data-i18n="themeSystem">システム</option>
              <option value="light" data-i18n="themeLight">ライト</option>
              <option value="dark" data-i18n="themeDark">ダーク</option>
            </select>
          </label>

          <label class="control-field">
            <span data-i18n="fontSize">文字サイズ</span>
            <select id="fontSizeSelect">
              <option value="small" data-i18n="fontSmall">小</option>
              <option value="normal" data-i18n="fontNormal">標準</option>
              <option value="large" data-i18n="fontLarge">大</option>
              <option value="xlarge" data-i18n="fontXLarge">特大</option>
            </select>
          </label>
        </div>
      </header>

      <main>
        <section class="toolbar" aria-label="Markdown操作">
          <label class="file-button" for="fileInput" data-i18n="openFile">.mdファイルを開く</label>
          <input id="fileInput" class="visually-hidden" type="file" accept=".md,.markdown,.txt,text/markdown,text/plain">
          <button id="loadSampleButton" type="button" data-i18n="loadSample">サンプルを読み込む</button>
          <button id="updatePreviewButton" type="button" data-i18n="updatePreview">プレビュー更新</button>
          <button id="openPreviewButton" type="button" data-i18n="openPreview">プレビューを開く</button>
          <span id="fileName" class="file-name" data-i18n="noFile">ファイル未選択</span>
        </section>

        <section class="workspace" aria-label="Markdown editor and preview">
          <article class="pane editor-pane">
            <div class="pane-header">
              <h2 data-i18n="editor">Markdown入力</h2>
              <span id="editorStatus" class="status-text"></span>
            </div>
            <textarea id="markdownInput" spellcheck="false" data-i18n-placeholder="editorPlaceholder"></textarea>
          </article>

          <article class="pane preview-pane">
            <div class="pane-header">
              <h2 data-i18n="preview">プレビュー</h2>
              <span id="previewStatus" class="status-text"></span>
            </div>
            <div id="preview" class="markdown-body" aria-live="polite"></div>
          </article>
        </section>
      </main>
    </div>

    <script src="vendor/markdown-it/markdown-it.min.js"></script>
    <script src="vendor/markdown-it-emoji/markdown-it-emoji.min.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
